<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="#0f172a"/>

  <!-- Document body (white, folded top-right corner) -->
  <path d="M128 96 H332 L416 180 V432 Q416 448 400 448 H128 Q112 448 112 432 V112 Q112 96 128 96 Z" fill="#f1f5f9"/>

  <!-- Folded corner crease -->
  <path d="M332 96 V180 H416" fill="none" stroke="#cbd5e1" stroke-width="8" stroke-linejoin="round"/>
  <path d="M332 96 L416 180" fill="#e2e8f0"/>

  <!-- Content lines (simulating invoice rows) -->
  <rect x="152" y="224" width="208" height="18" rx="9" fill="#94a3b8"/>
  <rect x="152" y="266" width="176" height="18" rx="9" fill="#94a3b8"/>
  <rect x="152" y="308" width="192" height="18" rx="9" fill="#94a3b8"/>

  <!-- Amount line — slightly darker, full width, suggests total -->
  <rect x="152" y="368" width="112" height="18" rx="9" fill="#64748b"/>
  <rect x="296" y="368" width="64" height="18" rx="9" fill="#334155"/>

  <!-- Small green tick badge — bottom right -->
  <circle cx="368" cy="384" r="72" fill="#16a34a"/>
  <path d="M332 384 L356 408 L408 352" fill="none" stroke="white" stroke-width="22" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
